services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: agents_example
      POSTGRES_USER: agents
      POSTGRES_PASSWORD: agents
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - synchronous_commit=off
      - -c
      - fsync=off              # benchmark only — REMOVE in production
      - -c
      - full_page_writes=off   # benchmark only — REMOVE in production
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents -d agents_example"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
